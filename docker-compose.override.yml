# docker-compose.override.yml
# 本地开发调试用，不影响生产 docker-compose.yml
services:
  postgres-test:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: dbs_admin
      POSTGRES_PASSWORD: Dbs@Admin2026
      POSTGRES_DB: testdb
    ports:
      - "15432:5432"

  redis-test:
    image: redis:7
    ports:
      - "16379:6379"

  mongo-test:
    image: mongo:7
    ports:
      - "27117:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: dbs_admin
      MONGO_INITDB_ROOT_PASSWORD: "Dbs@Admin2026"
