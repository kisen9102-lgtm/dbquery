<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · DBS 运维管理平台</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #1a2233 0%, #253047 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,.3);
      padding: 40px 48px;
      width: 100%;
      max-width: 420px;
    }
    .login-logo {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 32px;
    }
    .login-logo i { font-size: 32px; color: #2563eb; }
    .login-logo span { font-size: 22px; font-weight: 700; color: #1e293b; }
    .form-label { font-weight: 500; color: #374151; }
    .btn-login {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff; border: none; padding: 10px;
      font-size: 15px; font-weight: 500; border-radius: 8px;
    }
    .btn-login:hover { background: linear-gradient(135deg, #1d4ed8, #1e40af); color: #fff; }
    .divider { color: #94a3b8; font-size: 13px; text-align: center; margin: 16px 0; }
    .link-register { color: #2563eb; text-decoration: none; font-size: 14px; }
    .link-register:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <i class="bi bi-database-fill"></i>
      <span>DBS 运维平台</span>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 small">
      <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="post" action="/accounts/login/">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <div class="mb-3">
        <label class="form-label">用户名</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" name="username" placeholder="请输入用户名" autofocus autocomplete="username">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">密码</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" name="password" placeholder="请输入密码" autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="btn btn-login w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i>登录
      </button>
    </form>

    <div class="divider">— 或 —</div>
    <div class="text-center">
      <span class="text-muted" style="font-size:14px">没有账号？</span>
      <a href="/accounts/register/" class="link-register ms-1">立即注册</a>
    </div>
  </div>
</body>
</html>
