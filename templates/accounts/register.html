<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 · DBS 运维管理平台</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #1a2233 0%, #253047 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .register-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,.3);
      padding: 40px 48px;
      width: 100%;
      max-width: 420px;
    }
    .login-logo {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 32px;
    }
    .login-logo i { font-size: 32px; color: #2563eb; }
    .login-logo span { font-size: 22px; font-weight: 700; color: #1e293b; }
    .form-label { font-weight: 500; color: #374151; }
    .btn-register {
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: #fff; border: none; padding: 10px;
      font-size: 15px; font-weight: 500; border-radius: 8px;
    }
    .btn-register:hover { background: linear-gradient(135deg, #15803d, #166534); color: #fff; }
    .hint-box {
      background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #1e40af;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="register-card">
    <div class="login-logo">
      <i class="bi bi-database-fill"></i>
      <span>DBS 运维平台</span>
    </div>

    <div class="hint-box">
      <i class="bi bi-info-circle me-1"></i>
      注册账号默认为 <strong>查询用户</strong>，需要管理员将您添加到用户组后才能查询数据库。
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 small">
      <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success py-2 small">
      <i class="bi bi-check-circle me-1"></i>{{ success }}
      <a href="/accounts/login/" class="ms-2 fw-bold">去登录</a>
    </div>
    {% endif %}

    <form method="post" action="/accounts/register/">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">用户名</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" name="username" placeholder="请输入用户名" autofocus autocomplete="username">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">密码</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" name="password" placeholder="至少 6 位" autocomplete="new-password">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">确认密码</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" name="password2" placeholder="再次输入密码" autocomplete="new-password">
        </div>
      </div>
      <button type="submit" class="btn btn-register w-100">
        <i class="bi bi-person-plus me-1"></i>注册
      </button>
    </form>

    <div class="text-center mt-3">
      <span class="text-muted" style="font-size:14px">已有账号？</span>
      <a href="/accounts/login/" style="color:#2563eb; text-decoration:none; font-size:14px" class="ms-1">立即登录</a>
    </div>
  </div>
</body>
</html>
